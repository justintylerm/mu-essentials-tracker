<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>/mu/ Essentials Tracker</title>
<style>
  :root {
    --bg: #0e0e0e;
    --fg: #e8e8e8;
    --accent: #ff3030;
    --panel: #1a1a1a;
    --border: #2a2a2a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #toolbar {
    position: sticky; top: 0; z-index: 1000;
    display: flex; gap: 12px; align-items: center;
    padding: 10px 14px;
    background: rgba(14,14,14,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #toolbar button {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toolbar button:hover { background: #252525; }
  #toolbar .count { font-size: 13px; opacity: 0.85; margin-left: auto; }

  #stage-wrap { display: flex; justify-content: center; padding: 20px; }
  #stage {
    position: relative; display: inline-block;
    user-select: none; -webkit-user-select: none;
  }
  #chart {
    display: block;
    max-width: min(1781px, calc(100vw - 40px));
    height: auto;
    pointer-events: none;
  }

  .section {
    position: absolute;
    display: grid;
  }
  .cell { cursor: pointer; position: relative; }
  .cell:hover::before {
    content: "";
    position: absolute; inset: 4%;
    outline: 2px solid rgba(255,48,48,0.55);
    border-radius: 2px;
    pointer-events: none;
  }
  .cell.x {
    backdrop-filter: blur(6px) saturate(0.45);
    -webkit-backdrop-filter: blur(6px) saturate(0.45);
    background: rgba(0,0,0,0.35);
  }
  .cell.x::after {
    content: "";
    position: absolute; inset: 10%;
    background:
      linear-gradient(to top right,
        transparent calc(50% - 2px), var(--accent) calc(50% - 1.5px),
        var(--accent) calc(50% + 1.5px), transparent calc(50% + 2px)),
      linear-gradient(to top left,
        transparent calc(50% - 2px), var(--accent) calc(50% - 1.5px),
        var(--accent) calc(50% + 1.5px), transparent calc(50% + 2px));
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.95));
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-reset">Reset</button>
  <span class="count"><span id="x-count">0</span> crossed off</span>
</div>

<div id="stage-wrap">
  <div id="stage">
    <img id="chart" src="chart.jpg" alt="/mu/ essentials chart" />
  </div>
</div>

<script>
/* Chart image: 1781 × 4325. Coordinates derived from pixel analysis. */
const SECTIONS = [
  // /MU/CORE - "In the Aeroplane Over the Sea" (the big featured cover)
  { id: 'core-aeroplane', top: 340/4325*100,  left: 73/1781*100,   width: 200/1781*100,  height: 180/4325*100,  rows: 1, cols: 1 },
  // /MU/CORE - 7 cols × 2 rows of small album thumbs
  { id: 'core-grid',      top: 303/4325*100,  left: 307/1781*100,  width: 959/1781*100,  height: 268/4325*100,  rows: 2, cols: 7 },
  // Sub-/mu/core: 8 rows × 12 cols
  { id: 'sub',            top: 618/4325*100,  left: 53/1781*100,   width: 1166/1781*100, height: 780/4325*100,  rows: 8, cols: 12 },
  // Classics: 11 rows × 12 cols
  { id: 'classics',       top: 1443/4325*100, left: 53/1781*100,   width: 1166/1781*100, height: 1067/4325*100, rows: 11, cols: 12 },
  // Hip-Hop: 4 × 12
  { id: 'hiphop',         top: 2559/4325*100, left: 53/1781*100,   width: 1166/1781*100, height: 389/4325*100,  rows: 4, cols: 12 },
  // Bleeps: 4 × 12
  { id: 'bleeps',         top: 2997/4325*100, left: 53/1781*100,   width: 1166/1781*100, height: 390/4325*100,  rows: 4, cols: 12 },
  // Jazz: 4 × 12
  { id: 'jazz',           top: 3435/4325*100, left: 53/1781*100,   width: 1166/1781*100, height: 391/4325*100,  rows: 4, cols: 12 },
  // Metal: 4 × 12
  { id: 'metal',          top: 3874/4325*100, left: 53/1781*100,   width: 1166/1781*100, height: 390/4325*100,  rows: 4, cols: 12 },
];

const LS_KEY = 'mu-tracker:v2';
let crossed = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));

const stage = document.getElementById('stage');
const xCount = document.getElementById('x-count');

function render() {
  stage.querySelectorAll('.section').forEach(n => n.remove());
  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';
    div.style.top = sec.top + '%';
    div.style.left = sec.left + '%';
    div.style.width = sec.width + '%';
    div.style.height = sec.height + '%';
    div.style.gridTemplateColumns = `repeat(${sec.cols}, 1fr)`;
    div.style.gridTemplateRows = `repeat(${sec.rows}, 1fr)`;

    for (let r = 0; r < sec.rows; r++) {
      for (let c = 0; c < sec.cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const key = `${sec.id}:${r}:${c}`;
        if (crossed.has(key)) cell.classList.add('x');
        cell.addEventListener('click', () => {
          if (cell.classList.toggle('x')) crossed.add(key);
          else crossed.delete(key);
          localStorage.setItem(LS_KEY, JSON.stringify([...crossed]));
          xCount.textContent = crossed.size;
        });
        div.appendChild(cell);
      }
    }
    stage.appendChild(div);
  });
  xCount.textContent = crossed.size;
}

document.getElementById('chart').addEventListener('load', render);

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Clear all crossed-off albums?')) return;
  crossed.clear();
  localStorage.setItem(LS_KEY, JSON.stringify([]));
  render();
});
</script>
</body>
</html>
