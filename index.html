<style>
  :root {
    --bg: #242424;
    --fg: #e8e8e8;
    --accent: #ff3030;
    --pick: #ffd23f;
    --panel: #1a1a1a;
    --border: #2a2a2a;
    --dim: rgba(0,0,0,0.65);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* ── Sticky progress bar (top) ──────────────────────────────── */
  #progress-bar {
    position: sticky; top: 0; z-index: 900;
    height: 28px;
    background: #1a1a1a;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff3030, #ffd23f);
    transition: width 0.3s ease;
  }
  #progress-counter {
    position: absolute; inset: 0;
    font-size: 13px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    pointer-events: auto;
    cursor: default;
  }
  /* Both states overlap centered; we crossfade with opacity for a smooth swap. */
  #progress-counter .counter-default,
  #progress-counter .counter-percent {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: opacity 0.2s ease;
  }
  #progress-counter .counter-percent { opacity: 0; }
  #progress-counter:hover .counter-default { opacity: 0; }
  #progress-counter:hover .counter-percent { opacity: 1; }

  /* ── Action dropdown ──────────────────────────────────────────
     Three zones — left actions (far left), center toggle (chevron),
     right reset (X). The chevron stays in the same spot whether the
     dropdown is open or closed; only the left & right zones appear. */
  #left-actions {
    position: fixed;
    top: 36px;
    left: 13px;
    z-index: 1000;
    display: flex; gap: 8px; align-items: center;
  }
  #action-bar {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex; gap: 8px; align-items: center;
  }
  /* Show side zones only when actions are open. */
  body:not(.actions-open) #left-actions,
  body:not(.actions-open) #right-actions { display: none; }

  #left-actions button,
  #action-bar button {
    background: rgba(26,26,26,0.92);
    color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  #left-actions button:hover,
  #action-bar button:hover { background: rgba(40,40,40,0.95); }
  #left-actions button.primary {
    background: var(--pick); color: #111; border-color: var(--pick); font-weight: 600;
  }
  #left-actions button.primary:hover { background: #ffdb5c; }
  #left-actions button.primary.locked,
  #left-actions button.primary:disabled {
    background: #3a3a3a;
    color: #888;
    border-color: #3a3a3a;
    cursor: not-allowed;
  }
  #left-actions button.icon,
  #action-bar button.icon {
    padding: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
  }
  #left-actions button.icon svg,
  #action-bar button.icon svg {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  #left-actions button.icon.active {
    background: #3a3a3a;
    color: #888;
    border-color: #3a3a3a;
  }
  /* Right-side action group (sibling of #action-bar so position:fixed escapes
     the transformed parent). Holds upload, download-data, and reset. */
  #right-actions {
    position: fixed;
    top: 36px;
    right: 13px;
    z-index: 1000;
    display: flex; gap: 8px; align-items: center;
  }
  #right-actions button.icon {
    width: 36px; height: 36px;
    padding: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(26,26,26,0.92);
    color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  #right-actions button.icon:hover { background: rgba(40,40,40,0.95); }
  #right-actions button.icon svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  /* Reset gets a red-tinted hover to read as destructive. */
  #btn-reset:hover { background: rgba(60,30,30,0.95) !important; border-color: #5a2929 !important; }

  /* Toggle: a small chevron pill */
  #btn-toggle {
    width: 44px; height: 22px;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 11px;
  }
  #btn-toggle svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none; stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.2s ease;
  }
  body.actions-open #btn-toggle svg {
    transform: rotate(180deg);
  }
  #pick-label {
    position: fixed;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    background: rgba(26,26,26,0.92);
    border: 1px solid var(--pick); border-radius: 8px;
    color: var(--pick);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    white-space: nowrap;
    max-width: calc(100vw - 40px);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #skip-bar {
    position: fixed;
    top: 122px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001;
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px;
    background: rgba(26,26,26,0.92);
    border: 1px solid var(--border); border-radius: 8px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    font-size: 13px;
  }
  #skip-count {
    color: #ccc;
    font-variant-numeric: tabular-nums;
  }
  #btn-skip {
    background: var(--pick); color: #111;
    border: 1px solid var(--pick); border-radius: 5px;
    padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 12px;
  }
  #btn-skip:hover { background: #ffdb5c; }
  #btn-skip:disabled { background: #444; color: #888; border-color: #444; cursor: not-allowed; }

  #stage-wrap {
    display: block;
    padding: 0;
  }
  #stage {
    position: relative;
    display: block;
    width: 100%;
    user-select: none; -webkit-user-select: none;
  }
  #chart {
    display: block;
    width: 100%;
    max-width: none;
    height: auto;
    pointer-events: none;
  }

  .section {
    position: absolute;
    display: grid;
  }
  .cell { cursor: pointer; position: relative; }
  .cell:hover::before {
    content: "";
    position: absolute; inset: 4%;
    outline: 2px solid rgba(255,48,48,0.55);
    border-radius: 2px;
    pointer-events: none;
  }
  .cell.x {
    background: #242424;
    transition: background 0.15s ease;
  }
  /* Peek mode: reveal what's underneath at ~75% visibility */
  body.peek .cell.x {
    background: rgba(36, 36, 36, 0.90);
  }

  /* ── Pick mode: spotlight ─────────────────────────────────────── */
  /* Full-viewport invisible catcher that dismisses the pick when clicked. */
  #dismiss-catcher {
    position: fixed; inset: 0;
    z-index: 49;
    cursor: pointer;
    display: none;
  }
  /* The spotlight box. No background — chart shows through.
     The giant box-shadow with positive spread creates the dim everywhere
     OUTSIDE this rectangle. Sits above the catcher so clicks on the bright
     album register on the cell underneath. */
  #spotlight {
    position: absolute;
    z-index: 50;
    pointer-events: none;
    border-radius: 6px;
    /* Inset box-shadow draws the "outline" — respects border-radius, unlike
       the native outline property. */
    box-shadow:
      inset 0 0 0 4px var(--pick),
      0 0 30px 8px rgba(255,210,63,0.85),
      0 0 0 9999px var(--dim);
    animation: pulse 1.2s ease-in-out infinite;
    display: none;
  }
  /* During spin animation, kill the pulse — the rapid teleporting is the motion. */
  #spotlight.spinning {
    animation: none;
    box-shadow:
      inset 0 0 0 4px var(--pick),
      0 0 18px 4px rgba(255,210,63,0.7),
      0 0 0 9999px var(--dim);
  }
  @keyframes pulse {
    0%, 100% {
      box-shadow:
        inset 0 0 0 4px var(--pick),
        0 0 30px 8px rgba(255,210,63,0.85),
        0 0 0 9999px var(--dim);
    }
    50% {
      box-shadow:
        inset 0 0 0 4px var(--pick),
        0 0 55px 18px rgba(255,210,63,1),
        0 0 0 9999px var(--dim);
    }
  }
  /* When pick mode is active, the picked cell needs to sit ABOVE the spotlight
     so it can receive clicks. Spotlight is pointer-events:none, so clicks pass
     through it visually — but the .cell.pick z-index keeps the cell over the
     catcher (catcher is z-index 49). */
  /* The picked cell only needs to sit above the catcher (z-index 49) so it
     can receive clicks. All visual highlighting comes from the spotlight. */
  .cell.pick { z-index: 51; }
</style>

const LS_KEY = 'mu-tracker:v2:state';
const LS_TOKENS = 'mu-tracker:v2:tokens';
const LS_HIGHWATER = 'mu-tracker:v2:highwater';
const LS_PICKED = 'mu-tracker:v2:picked';
const REWARD_EVERY = 10;
const TOTAL = SECTIONS.reduce((sum, s) => sum + s.rows * s.cols, 0);
let crossed = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
let tokens = parseInt(localStorage.getItem(LS_TOKENS) || '0', 10);
let highWater = parseInt(localStorage.getItem(LS_HIGHWATER) || '0', 10);
let pickedKey = localStorage.getItem(LS_PICKED) || null;
let isAnimating = false;

// If a stored pick was already crossed off in another tab/manually, release it.
if (pickedKey && crossed.has(pickedKey)) {
  pickedKey = null;
  localStorage.removeItem(LS_PICKED);
}

const stage = document.getElementById('stage');
const xCount = document.getElementById('x-count');
const xTotal = document.getElementById('x-total');
const progressFill = document.getElementById('progress-fill');
const pickLabel = document.getElementById('pick-label');
const skipBar = document.getElementById('skip-bar');
const skipCount = document.getElementById('skip-count');
const btnSkip = document.getElementById('btn-skip');
const spotlight = document.getElementById('spotlight');
const catcher = document.getElementById('dismiss-catcher');
const btnPick = document.getElementById('btn-pick');

xTotal.textContent = TOTAL;

// Catch up any milestone rewards that were missed (e.g. if albums were crossed
// off before the tokens feature existed, or before this code ran).
checkRewards();

// One-time migration: an earlier version under-awarded tokens for users who
// had a large pre-existing cross-off set. Recompute the expected token count
// from highWater and bump up if needed. Never decreases tokens (so anyone
// who used skips keeps their actual balance). Runs once per browser.
(function migrateTokens_v1() {
  const FLAG = 'mu-tracker:v2:tokens_migrated_v1';
  if (localStorage.getItem(FLAG)) return;
  const expected = Math.floor(highWater / REWARD_EVERY);
  if (tokens < expected) {
    tokens = expected;
    localStorage.setItem(LS_TOKENS, tokens);
  }
  localStorage.setItem(FLAG, '1');
})();

function updateProgress() {
  xCount.textContent = crossed.size;
  const pct = crossed.size / TOTAL * 100;
  progressFill.style.width = pct + '%';
  document.getElementById('x-percent').textContent = Math.round(pct) + '%';
  updateLockState();
  updateSkipBar();
}

/* Update the skip-bar display (count + button visibility). */
function updateSkipBar() {
  skipCount.textContent = `${tokens} skip${tokens === 1 ? '' : 's'}`;
  btnSkip.style.display = tokens > 0 ? 'inline-block' : 'none';
}

/* Lifetime crosses high-water mark. When it advances past a multiple of
   REWARD_EVERY, award one skip token. Un-crossing does not deduct. */
function checkRewards() {
  let awarded = 0;
  while (crossed.size > highWater) {
    highWater++;
    if (highWater % REWARD_EVERY === 0) {
      tokens++;
      awarded++;
    }
  }
  if (awarded > 0) {
    localStorage.setItem(LS_TOKENS, tokens);
  }
  localStorage.setItem(LS_HIGHWATER, highWater);
}

function render() {
  stage.querySelectorAll('.section').forEach(n => n.remove());
  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.sectionId = sec.id;
    div.style.top = sec.top + '%';
    div.style.left = sec.left + '%';
    div.style.width = sec.width + '%';
    div.style.height = sec.height + '%';
    div.style.gridTemplateColumns = `repeat(${sec.cols}, 1fr)`;
    div.style.gridTemplateRows = `repeat(${sec.rows}, 1fr)`;

    for (let r = 0; r < sec.rows; r++) {
      for (let c = 0; c < sec.cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const key = `${sec.id}:${r}:${c}`;
        cell.dataset.key = key;
        if (crossed.has(key)) cell.classList.add('x');
        cell.addEventListener('click', () => {
          if (isAnimating) return;
          // Clicking the picked album crosses it off + clears the lock.
          const wasPicked = (pickedKey === key);
          if (cell.classList.toggle('x')) crossed.add(key);
          else crossed.delete(key);
          localStorage.setItem(LS_KEY, JSON.stringify([...crossed]));
          checkRewards();
          updateProgress();
          if (wasPicked) clearPick();
        });
        // Insert sections BEFORE the spotlight element so spotlight stays on top
        stage.insertBefore(div, spotlight);
        // (only the section div is inserted once; cells are appended to it)
        div.appendChild(cell);
      }
    }
  });
  updateProgress();
}

function formatPosition(sec, r, c) {
  const key = `${sec.id}:${r}:${c}`;
  if (ALBUMS[key]) return ALBUMS[key];
  // Fallback if the album isn't in the lookup
  if (sec.rows === 1 && sec.cols === 1) return sec.label;
  const rowLetter = String.fromCharCode(65 + r);
  return `${sec.label} ${rowLetter}-${c + 1}`;
}

/* Position the spotlight rectangle exactly over a given cell within #stage.
   The rectangle is inset 1px on every side so the golden outline aligns with
   the album cover rather than the slightly-larger grid cell. */
function positionSpotlightOnCell(cell) {
  const cellRect = cell.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  spotlight.style.left   = (cellRect.left - stageRect.left + 1) + 'px';
  spotlight.style.top    = (cellRect.top  - stageRect.top  + 1) + 'px';
  spotlight.style.width  = (cellRect.width  - 2) + 'px';
  spotlight.style.height = (cellRect.height - 2) + 'px';
  spotlight.style.display = 'block';
}

/* Lock state visuals: button shows the "locked" style while a pick is pending,
   but it stays clickable — clicking it re-shows the existing pick instead of
   re-randomizing. Only disabled outright while the spin animation is running. */
function updateLockState() {
  btnPick.disabled = isAnimating;
  btnPick.classList.toggle('locked', !!pickedKey && !isAnimating);
}

/* Re-display the existing locked pick: spotlight + dim + scroll to it. */
function reshowExistingPick() {
  if (!pickedKey) return;
  const cell = stage.querySelector(`.cell[data-key="${CSS.escape(pickedKey)}"]`);
  if (!cell) return;
  cell.classList.add('pick');
  positionSpotlightOnCell(cell);
  catcher.style.display = 'block';
  spotlight.classList.remove('spinning');
  pickLabel.style.display = 'inline';
  skipBar.style.display = 'flex';
  updateSkipBar();
  cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* Land on a specific cell — this is the FINAL state of the randomization. */
function landOnPick(sec, r, c) {
  const key = `${sec.id}:${r}:${c}`;
  const cell = stage.querySelector(`.cell[data-key="${CSS.escape(key)}"]`);
  if (!cell) return;

  pickedKey = key;
  localStorage.setItem(LS_PICKED, key);
  stage.querySelectorAll('.cell.pick').forEach(n => n.classList.remove('pick'));
  cell.classList.add('pick');

  positionSpotlightOnCell(cell);
  catcher.style.display = 'block';
  spotlight.classList.remove('spinning'); // resume pulsing
  pickLabel.textContent = formatPosition(sec, r, c);
  pickLabel.style.display = 'inline';
  skipBar.style.display = 'flex';
  updateSkipBar();

  cell.scrollIntoView({ behavior: 'smooth', block: 'center' });

  isAnimating = false;
  updateLockState();
}

/* Clear the pick fully — used when picked album is crossed off, or on Reset. */
function clearPick() {
  pickedKey = null;
  localStorage.removeItem(LS_PICKED);
  isAnimating = false;
  stage.querySelectorAll('.cell.pick').forEach(n => n.classList.remove('pick'));
  spotlight.classList.remove('spinning');
  spotlight.style.display = 'none';
  catcher.style.display = 'none';
  pickLabel.style.display = 'none';
  pickLabel.textContent = '';
  skipBar.style.display = 'none';
  updateLockState();
}

/* Dismiss the entire randomization focus mode visually — spotlight, dim,
   pulse on the picked cell, the pick label, and the skip bar all hide.
   The lock state (pickedKey) persists so the button stays locked; hitting
   Randomize again restores the whole view. */
function dismissSpotlight() {
  if (isAnimating) return;
  spotlight.style.display = 'none';
  catcher.style.display = 'none';
  stage.querySelectorAll('.cell.pick').forEach(n => n.classList.remove('pick'));
  pickLabel.style.display = 'none';
  skipBar.style.display = 'none';
}

/* Run the slot-machine spin: rapidly jump the spotlight through random cells
   in the pool, decelerating, then land on the final pick. */
function runSpin(pool, final) {
  isAnimating = true;
  updateLockState();

  catcher.style.display = 'block';
  spotlight.classList.add('spinning');
  // Hide the pick label + skip bar during the spin so we don't spoil the result
  pickLabel.style.display = 'none';
  skipBar.style.display = 'none';
  stage.querySelectorAll('.cell.pick').forEach(n => n.classList.remove('pick'));

  // 4 intermediate stops, decelerating, then the 5th stop is the final pick.
  // Delays are longer than typical browser smooth-scroll duration (~500ms)
  // so the viewport settles on each cell before the next jump.
  // The 1st step gets extra headroom because the scroll distance from the
  // user's current view to a random cell can be large.
  const DELAYS = [1100, 900, 1100, 1400];
  let i = 0;

  function step() {
    if (i < DELAYS.length) {
      // Pick a random intermediate (not necessarily the final).
      const intermediate = pool[Math.floor(Math.random() * pool.length)];
      const key = `${intermediate.sec.id}:${intermediate.r}:${intermediate.c}`;
      const cell = stage.querySelector(`.cell[data-key="${CSS.escape(key)}"]`);
      if (cell) {
        // Smooth-scroll viewport to follow the spotlight so the user always sees it.
        cell.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'smooth' });
        positionSpotlightOnCell(cell);
      }
      setTimeout(step, DELAYS[i]);
      i++;
    } else {
      // Land — smooth scroll for graceful settle into the final pick.
      landOnPick(final.sec, final.r, final.c);
    }
  }

  step();
}

btnPick.addEventListener('click', () => {
  if (isAnimating) return;

  // If a pick is locked (not yet crossed off), don't re-randomize — just
  // bring the user back to it.
  if (pickedKey) {
    reshowExistingPick();
    return;
  }

  // Pool of all non-crossed cells
  const pool = [];
  SECTIONS.forEach(sec => {
    for (let r = 0; r < sec.rows; r++) {
      for (let c = 0; c < sec.cols; c++) {
        const key = `${sec.id}:${r}:${c}`;
        if (!crossed.has(key)) pool.push({ sec, r, c });
      }
    }
  });
  if (pool.length === 0) {
    alert("You've crossed off every album. Mutant status achieved.");
    return;
  }
  const final = pool[Math.floor(Math.random() * pool.length)];
  runSpin(pool, final);
});

btnSkip.addEventListener('click', () => {
  if (isAnimating || !pickedKey || tokens <= 0) return;

  // Deduct a token
  tokens--;
  localStorage.setItem(LS_TOKENS, tokens);

  // Wipe current pick state (without crossing off the album)
  pickedKey = null;
  localStorage.removeItem(LS_PICKED);
  stage.querySelectorAll('.cell.pick').forEach(n => n.classList.remove('pick'));
  pickLabel.style.display = 'none';
  // Keep skipBar visible — runSpin will show it on land

  // Build pool of remaining non-crossed cells and spin again
  const pool = [];
  SECTIONS.forEach(sec => {
    for (let r = 0; r < sec.rows; r++) {
      for (let c = 0; c < sec.cols; c++) {
        const key = `${sec.id}:${r}:${c}`;
        if (!crossed.has(key)) pool.push({ sec, r, c });
      }
    }
  });
  if (pool.length === 0) {
    clearPick();
    alert("You've crossed off every album. Mutant status achieved.");
    return;
  }
  const final = pool[Math.floor(Math.random() * pool.length)];
  runSpin(pool, final);
});

catcher.addEventListener('click', dismissSpotlight);
document.addEventListener('keydown', e => {
  // Don't hijack keys when typing in a form field (none currently, but defensive).
  if (e.target.matches && e.target.matches('input, textarea, [contenteditable]')) return;

  if (e.key === 'Escape') dismissSpotlight();
  if (e.code === 'Space') {
    e.preventDefault(); // stop the default page-scroll behavior
    handleMenuToggle();
  }
  if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    btnPick.click();
  }
});

// On resize, if a pick is locked, reposition the spotlight on the picked cell
// so the highlight follows the layout (don't lose lock state).
window.addEventListener('resize', () => {
  if (!pickedKey || isAnimating) return;
  const cell = stage.querySelector(`.cell[data-key="${CSS.escape(pickedKey)}"]`);
  if (cell && spotlight.style.display !== 'none') positionSpotlightOnCell(cell);
});

function initChart() {
  render();
  // If a pick was persisted from a previous session, only restore the lock state
  // on the Randomize button. The pick label, skip bar, and spotlight stay hidden
  // until the user clicks Randomize again (which calls reshowExistingPick and
  // pre-populates the pick label from pickedKey at that point).
  if (pickedKey) {
    const [sectionId, rStr, cStr] = pickedKey.split(':');
    const sec = SECTIONS.find(s => s.id === sectionId);
    if (sec) {
      pickLabel.textContent = formatPosition(sec, parseInt(rStr, 10), parseInt(cStr, 10));
    }
    updateLockState();
  }
}

(function bootChart() {
  const img = document.getElementById('chart');
  // The chart src is a base64 data URL set before this script runs. If the image
  // is already decoded by now, the `load` event has already fired and won't fire
  // again — call init immediately. Otherwise wait for `load`.
  if (img.complete && img.naturalWidth > 0) {
    initChart();
  } else {
    img.addEventListener('load', initChart, { once: true });
    // Also handle the failure case so we don't sit with a blank chart forever.
    img.addEventListener('error', () => console.error('chart image failed to load'), { once: true });
  }
})();

document.getElementById('btn-peek').addEventListener('click', e => {
  const on = document.body.classList.toggle('peek');
  e.currentTarget.classList.toggle('active', on);
});

/* Toggle handler: if any UI overlay is open (menu OR randomizer spotlight),
   the chevron closes everything. Otherwise it opens the menu. */
function handleMenuToggle() {
  const menuOpen = document.body.classList.contains('actions-open');
  const randomizerShowing = !!pickedKey && spotlight.style.display !== 'none';
  if (menuOpen || randomizerShowing) {
    document.body.classList.remove('actions-open');
    if (randomizerShowing) dismissSpotlight();
  } else {
    document.body.classList.add('actions-open');
  }
}

document.getElementById('btn-toggle').addEventListener('click', handleMenuToggle);

/* Export the current state of the chart as a JPG.
   Mirrors the on-screen treatment of crossed-off cells:
   - Peek OFF → solid #242424 fill
   - Peek ON  → semi-transparent fill so cover bleeds through. */
document.getElementById('btn-export').addEventListener('click', () => {
  const defaultName = `mu-progress-${crossed.size}-of-${TOTAL}.jpg`;
  const input = prompt('Save screenshot as:', defaultName);
  if (!input) return;
  const filename = /\.jpe?g$/i.test(input) ? input : input + '.jpg';

  const img = document.getElementById('chart');
  // Use the natural image dimensions for max quality output.
  const W = img.naturalWidth  || 1781;
  const H = img.naturalHeight || 4325;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 1. Draw the chart
  ctx.drawImage(img, 0, 0, W, H);

  // 2. Overlay the same color used in the live UI
  const peek = document.body.classList.contains('peek');
  ctx.fillStyle = peek ? 'rgba(36, 36, 36, 0.90)' : '#242424';

  // 3. Paint a fill over each crossed-off cell (matching the 1px inset
  // used by the spotlight so the export looks like the live UI).
  SECTIONS.forEach(sec => {
    const secLeft = sec.left   / 100 * W;
    const secTop  = sec.top    / 100 * H;
    const secW    = sec.width  / 100 * W;
    const secH    = sec.height / 100 * H;
    const cellW = secW / sec.cols;
    const cellH = secH / sec.rows;
    for (let r = 0; r < sec.rows; r++) {
      for (let c = 0; c < sec.cols; c++) {
        const key = `${sec.id}:${r}:${c}`;
        if (!crossed.has(key)) continue;
        ctx.fillRect(
          secLeft + c * cellW + 1,
          secTop  + r * cellH + 1,
          cellW - 2,
          cellH - 2
        );
      }
    }
  });

  // 4. Convert to JPG (synchronous) and trigger download immediately so the
  // user-gesture context is preserved (some browsers block async downloads).
  let dataUrl;
  try {
    dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  } catch (err) {
    // Most likely a tainted-canvas SecurityError when loading via file://.
    alert(
      'Could not export: ' + (err && err.message ? err.message : err) +
      '\n\nThis can happen when opening the page directly from a file:// URL ' +
      'in some browsers. Try Safari, or serve the folder via a tiny local HTTP server.'
    );
    return;
  }

  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

/* ── Download data: dump all mu-tracker localStorage keys to a JSON file ──
   Lets you keep a portable backup of your progress, tokens, and locked pick. */
document.getElementById('btn-download-data').addEventListener('click', () => {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('mu-tracker')) data[k] = localStorage.getItem(k);
  }
  if (Object.keys(data).length === 0) {
    alert('No saved data to download yet.');
    return;
  }
  const defaultName = `mu-tracker-backup-${crossed.size}-of-${TOTAL}.json`;
  const input = prompt('Save backup as:', defaultName);
  if (!input) return;
  const filename = /\.json$/i.test(input) ? input : input + '.json';

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

/* ── Upload data: read a JSON backup and restore it into localStorage ────── */
document.getElementById('btn-upload').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let parsed;
      try {
        parsed = JSON.parse(reader.result);
      } catch (err) {
        alert('Could not parse backup file: ' + err.message);
        return;
      }
      if (typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)) {
        alert('Backup file is not in the expected format.');
        return;
      }
      const keys = Object.keys(parsed).filter(k => k.startsWith('mu-tracker'));
      if (keys.length === 0) {
        alert('Backup file has no /mu/ tracker data.');
        return;
      }
      if (!confirm(`Replace your current progress with the uploaded backup (${keys.length} keys)? This cannot be undone.`)) return;

      // Clear any existing mu-tracker keys, then write the uploaded ones.
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('mu-tracker')) localStorage.removeItem(k);
      }
      keys.forEach(k => localStorage.setItem(k, parsed[k]));
      location.reload();
    };
    reader.readAsText(file);
  };
  input.click();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Clear all crossed-off albums? This will also reset earned skip tokens.')) return;
  crossed.clear();
  tokens = 0;
  highWater = 0;
  localStorage.setItem(LS_KEY, JSON.stringify([]));
  localStorage.setItem(LS_TOKENS, '0');
  localStorage.setItem(LS_HIGHWATER, '0');
  clearPick();
  render();
});
</script>
</body>
</html>
